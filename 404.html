<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, follow">
  <title>Página não encontrada | Ninja's Barbershop</title>
  <meta name="description" content="A página que você procurou não foi encontrada. Volte para o site da Ninja's Barbershop em Tietê, SP.">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 32px 24px;
      background: #0b0b0b;
      color: #fff;
      font-family: Arial, Helvetica, sans-serif;
    }

    main {
      width: min(680px, 100%);
      text-align: center;
    }

    .code {
      color: #c9a24a;
      font-size: clamp(5rem, 22vw, 10rem);
      font-weight: 800;
      line-height: 0.9;
      letter-spacing: -0.08em;
    }

    h1 {
      margin-top: 28px;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(2rem, 7vw, 3.5rem);
      line-height: 1.05;
    }

    p {
      max-width: 520px;
      margin: 20px auto 32px;
      color: #b8b8b8;
      font-size: 1rem;
      line-height: 1.7;
    }

    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      padding: 14px 24px;
      border: 1px solid #c9a24a;
      background: #c9a24a;
      color: #0b0b0b;
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-decoration: none;
      text-transform: uppercase;
    }

    a:focus-visible {
      outline: 3px solid #fff;
      outline-offset: 4px;
    }
  </style>
</head>

<body>
  <main>
    <div class="code" aria-hidden="true">404</div>
    <h1>Essa página saiu do corte.</h1>
    <p>O endereço pode ter mudado ou não existir. Volte para a página principal e encontre nossos serviços, horários e localização.</p>
    <a href="/">Voltar para o início</a>
  </main>
</body>

</html>
